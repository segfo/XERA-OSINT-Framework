<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <style>
      .tb{fill:#0f172a;font-size:14px;font-weight:700;}
      .ts{fill:#475569;font-size:11.5px;}
      .out{fill:#1d4ed8;font-size:11.5px;font-weight:600;}
      .edge{stroke:#64748b;stroke-width:1.6;fill:none;}
      .ph{fill:#1e293b;font-size:12px;font-weight:700;}
    </style>
  </defs>
  <rect x="0" y="0" width="880" height="430" fill="#ffffff"/>
  <text x="440" y="32" text-anchor="middle" class="tb" font-size="19">4 エージェント・パイプライン（osint-agent.py / クエリ駆動）</text>
  <text x="440" y="54" text-anchor="middle" class="ts">各フェーズは独立 claude セッション。収集・解析・まとめを分離してコンテキスト肥大を防ぐ。</text>

  <!-- column boxes -->
  <!-- Phase 0 -->
  <rect x="24" y="80" width="150" height="250" rx="10" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="99" y="104" text-anchor="middle" class="ph">Phase 0 — 計画</text>
  <text x="99" y="128" text-anchor="middle" class="ts">plan-clearnet</text>
  <text x="99" y="145" text-anchor="middle" class="ts">（deepdarkCTI +</text>
  <text x="99" y="161" text-anchor="middle" class="ts">Brave / Tavily）</text>
  <text x="99" y="190" text-anchor="middle" class="ts">plan-dark</text>
  <text x="99" y="206" text-anchor="middle" class="ts">（onion_search +</text>
  <text x="99" y="222" text-anchor="middle" class="ts">ログイン済フォーラム）</text>
  <text x="99" y="252" text-anchor="middle" class="ts">統合・重複排除</text>
  <text x="99" y="268" text-anchor="middle" class="ts">ランク付け</text>
  <text x="99" y="312" text-anchor="middle" class="out">→ plan.json</text>

  <!-- Phase 1 -->
  <rect x="200" y="80" width="150" height="250" rx="10" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="275" y="104" text-anchor="middle" class="ph">Phase 1 — 収集</text>
  <text x="275" y="138" text-anchor="middle" class="ts">各 URL をブラウザ操作</text>
  <text x="275" y="156" text-anchor="middle" class="ts">tor_fetch / browser_open</text>
  <text x="275" y="186" text-anchor="middle" class="ts">本文はファイルへ保存</text>
  <text x="275" y="204" text-anchor="middle" class="ts">LLM にはメタのみ返す</text>
  <text x="275" y="234" text-anchor="middle" class="ts">最大10画面・3階層</text>
  <text x="275" y="312" text-anchor="middle" class="out">→ raw/NNN-MM-*.md</text>

  <!-- Phase 2 -->
  <rect x="376" y="80" width="150" height="250" rx="10" fill="#fef9c3" stroke="#eab308"/>
  <text x="451" y="104" text-anchor="middle" class="ph">Phase 2 — 解析</text>
  <text x="451" y="138" text-anchor="middle" class="ts">1 ファイル = 1 セッション</text>
  <text x="451" y="168" text-anchor="middle" class="ts">5W1H / IOC /</text>
  <text x="451" y="184" text-anchor="middle" class="ts">外部リンク抽出</text>
  <text x="451" y="214" text-anchor="middle" class="ts">意味判定・構造化</text>
  <text x="451" y="312" text-anchor="middle" class="out">→ interim/NNN-MM-*.md</text>

  <!-- Phase 3 -->
  <rect x="552" y="80" width="150" height="250" rx="10" fill="#fae8ff" stroke="#a855f7"/>
  <text x="627" y="104" text-anchor="middle" class="ph">Phase 3 — まとめ</text>
  <text x="627" y="138" text-anchor="middle" class="ts">URL 単位で集約</text>
  <text x="627" y="168" text-anchor="middle" class="ts">同一 NNN の interim を</text>
  <text x="627" y="184" text-anchor="middle" class="ts">横断・重複排除</text>
  <text x="627" y="312" text-anchor="middle" class="out">→ stage1-NNN-*.md</text>

  <!-- Phase 4 -->
  <rect x="728" y="80" width="128" height="250" rx="10" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="792" y="104" text-anchor="middle" class="ph">Phase 4</text>
  <text x="792" y="120" text-anchor="middle" class="ph">レポート</text>
  <text x="792" y="154" text-anchor="middle" class="ts">stage1 群を</text>
  <text x="792" y="170" text-anchor="middle" class="ts">横断してまとめ</text>
  <text x="792" y="200" text-anchor="middle" class="ts">クエリへの回答</text>
  <text x="792" y="312" text-anchor="middle" class="out">→ report.md</text>

  <!-- arrows -->
  <path class="edge" d="M174,205 L198,205" marker-end="url(#a2)"/>
  <path class="edge" d="M350,205 L374,205" marker-end="url(#a2)"/>
  <path class="edge" d="M526,205 L550,205" marker-end="url(#a2)"/>
  <path class="edge" d="M702,205 L726,205" marker-end="url(#a2)"/>

  <text x="440" y="364" text-anchor="middle" class="ts">サイト棚卸し（osint-survey.py）は Phase 1 概要 → 2 収集 → 3 解析 → 4 まとめ → 5 動向レポート（report-trends.md）。</text>
  <text x="440" y="386" text-anchor="middle" class="ts">どちらも --resume-dir で途中再開可。ログイン / CAPTCHA は人間 resume 方式で突破する。</text>
</svg>
